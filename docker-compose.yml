services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-rag-memory
    ports:
      - "6379:6379"   # Redis database port
      - "8001:8001"   # RedisInsight GUI port
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
